<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Recipe Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Smart Recipe Generator</h1>
            <p>Enter the ingredients you have, and our AI chef will create a custom recipe for you!</p>
        </header>

        <div class="input-section">
            <input type="text" id="ingredients-input" placeholder="e.g., potato, tomato, onion, bread">
            <button id="generate-btn">Generate Recipe</button>
        </div>

        <div class="api-section">
            <input type="password" id="api-key-input" placeholder="Enter your Gemini API Key">
        </div>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p>Chef is cooking up a recipe...</p>
        </div>

        <div class="recipe-card" id="recipe-card">
            <h2 id="recipe-title"></h2>
            <div class="recipe-content" id="recipe-content"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
